name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # When a release is created, move the major version tag (e.g. v0) to the latest commit.
      # Releases created via GITHUB_TOKEN do not trigger the release event,
      # so this is handled here instead of a separate workflow.
      - uses: actions/checkout@v6.0.2
        if: ${{ steps.release.outputs.release_created }}

      - name: Move major version tag
        if: ${{ steps.release.outputs.release_created }}
        run: |
          set -euo pipefail
          TAG="${{ steps.release.outputs.tag_name }}"
          MAJOR="${TAG%%.*}"
          echo "Moving tag $MAJOR -> $TAG"
          git tag -f "$MAJOR"
          git push origin "$MAJOR" --force
